      description: "Notifications settings navigation link"
    
    preferencesLink:
      selector: "[data-testid='settings-nav-preferences']"
      strategy: data-testid
      description: "Preferences settings navigation link"
    
    integrationsLink:
      selector: "[data-testid='settings-nav-integrations']"
      strategy: data-testid
      description: "Integrations settings navigation link"

  profile:
