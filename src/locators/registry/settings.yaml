# Settings Domain Locators
# @module locators/registry/settings
# @requirements 1.1, 1.3
#
# This file defines all UI element locators for the settings domain.
# Locators are organized by page and component for easy maintenance.

settings:
  navigation:
    container:
      selector: "[data-testid='settings-nav']"
      strategy: data-testid
      description: "Settings navigation sidebar"
    
    profileLink:
      selector: "[data-testid='settings-nav-profile']"
      strategy: data-testid
      description: "Profile settings navigation link"
    
    securityLink:
      selector: "[data-testid='settings-nav-security']"
      strategy: data-testid
      description: "Security settings navigation link"
    
    notificationsLink:
      selector: "[data-testid='settings-nav-notifications']"
